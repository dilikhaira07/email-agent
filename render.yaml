services:
  - type: worker
    name: telegram-claude-bot
    runtime: python
    buildCommand: pip install -r OutlookAgent/requirements.txt
    startCommand: python OutlookAgent/telegram_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
